services:
  db:
    image: postgres:16
    container_name: payroll-pg
    environment:
      POSTGRES_USER: payroll_admin
      POSTGRES_PASSWORD: payroll_dev_pw
      POSTGRES_DB: payroll
    ports:
      - "5544:5432"
    volumes:
      - payroll_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payroll_admin -d payroll"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  payroll_pgdata:
